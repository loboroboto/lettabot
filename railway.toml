# Railway deployment configuration for lettabot
# https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"

[build.nixpacks]
nixPkgs = ["nodejs_22", "curl"]

[deploy]
# Build TypeScript before starting; install gogcli for Gmail polling
buildCommand = "npm run build && ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/') && curl -fsSL https://github.com/steipete/gogcli/releases/download/v0.12.0/gogcli_0.12.0_linux_${ARCH}.tar.gz | tar -xz -C /usr/local/bin gog && git clone --depth 1 https://github.com/loboroboto/travel-agent-skills.git /tmp/travel-skills && cp -r /tmp/travel-skills/skills/* .skills/ && rm -rf /tmp/travel-skills"
# Start the server
startCommand = "npm start"
# Health check endpoint
healthcheckPath = "/health"
healthcheckTimeout = 30
# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
