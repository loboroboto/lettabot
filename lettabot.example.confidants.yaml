# LettaBot Configuration
# Copy this to lettabot.yaml and fill in your values.
# 
# Server modes:
# - 'api': Use Letta API (api.letta.com) with API key
# - 'docker': Use a Docker/custom Letta server

server:
  mode: api
  # For api mode, set your API key (get one at https://app.letta.com):
  apiKey: 
  # For docker mode, uncomment and set the base URL:
  # mode: docker
  # baseUrl: http://localhost:8283

agents:
  - name: Segundo Chef
    id: 
    features:
      cron: true
      heartbeat:
        enabled: true
        intervalMin: 30
      allowedTools: [Bash, Read, Edit, Write, Glob, Grep, Task, web_search, conversation_search]
      disallowedTools: [EnterPlanMode, ExitPlanMode]
    conversations:
      mode: shared
      heartbeat: last-active
    channels:
      telegram:
        enabled: true
        token: 
        dmPolicy: allowlist
        allowedUsers:
          - 452288517
          - 1419901175 
        groupDebounceSec: 5
        groups:
          "-5146016739": { mode: open }

  - name: Doctorcito
    id: 
    features:
